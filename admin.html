<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de administración · Boda María y Jesús</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #EDE5D4; font-family: 'Cormorant Garamond', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px; }

    /* LOGIN */
    .login-card {
      width: 100%; max-width: 380px; background: #FAF6EF;
      border: 1px solid #C9A84C; border-radius: 2px;
      padding: 48px 40px; text-align: center; position: relative; margin-top: 80px;
    }
    .login-card::before {
      content: ''; position: absolute; inset: 10px;
      border: 0.5px solid #C9A84C; opacity: 0.5; pointer-events: none;
    }

    /* ADMIN */
    .admin-wrap { width: 100%; max-width: 900px; display: none; flex-direction: column; gap: 24px; }

    .admin-header {
      background: #FAF6EF; border: 1px solid #C9A84C; border-radius: 2px;
      padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
    }

    .stats { display: flex; gap: 32px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num { font-family: 'Cinzel', serif; font-size: 32px; color: #3A2E1A; }
    .stat-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #8B7340; }

    .export-btn {
      padding: 12px 24px; background: #C9A84C; border: none; border-radius: 2px;
      font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: #FAF6EF; cursor: pointer; transition: background 0.2s;
    }
    .export-btn:hover { background: #8B7340; }

    .table-card {
      background: #FAF6EF; border: 1px solid #C9A84C; border-radius: 2px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }
    thead { background: #F0E8D4; }
    th {
      font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: #8B7340; padding: 14px 20px; text-align: left;
      border-bottom: 0.5px solid #C9A84C;
    }
    td {
      font-size: 15px; color: #3A2E1A; padding: 12px 20px;
      border-bottom: 0.5px solid rgba(201,168,76,0.2);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAF0D8; }
    .td-detalles { font-style: italic; color: #8B7340; font-size: 13px; }
    .td-fecha { font-size: 12px; color: #8B7340; }
    .badge {
      display: inline-block; background: #F0E8D4; border: 0.5px solid #C9A84C;
      border-radius: 2px; padding: 2px 10px; font-family: 'Cinzel', serif;
      font-size: 12px; color: #5A4A28;
    }

    /* SHARED */
    .title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 400; color: #3A2E1A; letter-spacing: 0.1em; margin-bottom: 8px; }
    .subtitle { font-size: 13px; font-style: italic; color: #8B7340; margin-bottom: 24px; }
    .field { margin-bottom: 20px; text-align: left; }
    .label { display: block; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #8B7340; margin-bottom: 8px; }
    .input {
      width: 100%; padding: 12px 16px; background: #F0E8D4;
      border: 0.5px solid #C9A84C; border-radius: 2px;
      font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #3A2E1A;
      outline: none; text-align: center; letter-spacing: 0.3em;
    }
    .input:focus { border-color: #8B7340; }
    .btn {
      width: 100%; padding: 14px; background: #C9A84C; border: none; border-radius: 2px;
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.25em;
      text-transform: uppercase; color: #FAF6EF; cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #8B7340; }
    .error-msg { margin-top: 16px; font-size: 13px; font-style: italic; color: #7A3A28; display: none; }
    .loading { font-size: 14px; font-style: italic; color: #8B7340; text-align: center; padding: 32px; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-card" id="login-card">
    <div class="title">Panel de administración</div>
    <p class="subtitle">Boda María &amp; Jesús · 4 julio 2026</p>
    <div class="field">
      <label class="label">Contraseña</label>
      <input class="input" type="password" id="pwd" placeholder="······" onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn" onclick="login()">Acceder</button>
    <p class="error-msg" id="error-msg">Contraseña incorrecta</p>
  </div>

  <!-- ADMIN -->
  <div class="admin-wrap" id="admin-wrap">

    <div class="admin-header">
      <div>
        <div class="title" style="margin-bottom:4px;">Listado de asistentes</div>
        <p style="font-size:13px;font-style:italic;color:#8B7340;">Boda María &amp; Jesús · 4 julio 2026</p>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="stat-reservas">—</div>
          <div class="stat-label">Reservas</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-personas">—</div>
          <div class="stat-label">Personas</div>
        </div>
      </div>
      <button class="export-btn" onclick="exportarExcel()">Exportar Excel</button>
    </div>

    <div class="table-card">
      <div class="loading" id="loading">Cargando datos...</div>
      <table id="tabla" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Asistentes</th>
            <th>Detalles</th>
            <th>Fecha confirmación</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBxoQzgHdnnIOboToI2tWpCui1qwY1RkEo",
      authDomain: "databasewed-47003.firebaseapp.com",
      projectId: "databasewed-47003",
      storageBucket: "databasewed-47003.firebasestorage.app",
      messagingSenderId: "625026927482",
      appId: "1:625026927482:web:b45beac62e0d9dff2f24c3"
    });

    const db = firebase.firestore();
    let datos = [];

    function login() {
      const pwd = document.getElementById('pwd').value;
      if (pwd === '040726') {
        document.getElementById('login-card').style.display = 'none';
        document.getElementById('admin-wrap').style.display = 'flex';
        cargarDatos();
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('pwd').value = '';
      }
    }

    async function cargarDatos() {
      const snapshot = await db.collection('asistencias').orderBy('fecha').get();
      datos = snapshot.docs.map(doc => doc.data());

      const totalReservas = datos.length;
      const totalPersonas = datos.reduce((s, d) => s + (d.asistentes || 1), 0);

      document.getElementById('stat-reservas').textContent = totalReservas;
      document.getElementById('stat-personas').textContent = totalPersonas;

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      datos.forEach((d, i) => {
        const fecha = d.fecha ? new Date(d.fecha).toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
        tbody.innerHTML += `
          <tr>
            <td style="color:#8B7340;font-size:13px;">${i + 1}</td>
            <td><strong>${d.nombre || '—'}</strong></td>
            <td><span class="badge">${d.asistentes || 1}</span></td>
            <td class="td-detalles">${d.detalles || '—'}</td>
            <td class="td-fecha">${fecha}</td>
          </tr>`;
      });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('tabla').style.display = 'table';
    }

    function exportarExcel() {
      const filas = datos.map((d, i) => ({
        '#': i + 1,
        'Nombre': d.nombre || '',
        'Asistentes': d.asistentes || 1,
        'Detalles / Alergias': d.detalles || '',
        'Fecha confirmación': d.fecha ? new Date(d.fecha).toLocaleString('es-ES') : ''
      }));

      const ws = XLSX.utils.json_to_sheet(filas);
      ws['!cols'] = [{ wch: 4 }, { wch: 30 }, { wch: 12 }, { wch: 40 }, { wch: 22 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Asistentes');
      XLSX.writeFile(wb, 'asistentes-boda-maria-jesus.xlsx');
    }
  </script>

</body>
</html>
